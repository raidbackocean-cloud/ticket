<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>取置算出表 Pro</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --input-bg: #334155;
            --text-main: #f8fafc; --text-sub: #94a3b8; --accent: #38bdf8;
            --success: #10b981; --danger: #ef4444; --border: #334155;
            --summary-bg: rgba(15, 23, 42, 0.95);
        }
        body.light-mode {
            --bg: #f8fafc; --card: #ffffff; --input-bg: #f1f5f9;
            --text-main: #1e293b; --text-sub: #64748b; --accent: #0284c7;
            --border: #e2e8f0; --summary-bg: rgba(255, 255, 255, 0.9);
        }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); margin: 0; padding: 15px 15px 220px; transition: 0.3s; overflow-x: hidden; position: fixed; width: 100%; height: 100%; }
        .container { max-width: 500px; margin: auto; height: 100%; overflow-y: auto; padding-bottom: 250px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 15px; }
        h1 { font-size: 1rem; margin: 0; }
        .btn-reset { border: 1px solid var(--danger); color: var(--danger); padding: 6px 12px; border-radius: 20px; font-size: 0.65rem; cursor: pointer; background: transparent; }

        section { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        h2 { font-size: 0.7rem; color: var(--accent); margin: 0 0 12px 0; letter-spacing: 1px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 0.65rem; font-weight: bold; margin-bottom: 4px; color: var(--text-sub); }
        
        /* 数値入力（会場費など） */
        .std-input { 
            background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); 
            padding: 10px; border-radius: 8px; font-size: 1rem; outline: none; width: 100%; text-align: center;
        }

        /* クルクル・ホイールエリア（タグではなくただの板） */
        .wheel {
            background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(255,255,255,0.05) 50%, rgba(0,0,0,0.2) 100%);
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
            touch-action: none; /* iPhoneのスクロール・スワイプを完全に殺す */
            user-select: none;
            -webkit-user-select: none;
        }

        .band-card { background: var(--input-bg); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
        .band-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .band-name { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); font-weight: bold; width: 60%; font-size: 0.9rem; }
        .btn-del { color: var(--danger); background: none; border: none; font-size: 0.7rem; }
        
        .band-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .band-footer { display: flex; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 8px; font-size: 0.65rem; }
        
        .btn-add { width: 100%; padding: 12px; background: transparent; color: var(--accent); border: 2px dashed var(--accent); border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .summary-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: var(--summary-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 15px; z-index: 1000; }
        .sum-main { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .sum-total { font-size: 1.8rem; font-weight: 900; color: var(--text-main); }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; color: #fff; }
        .status-up { background: var(--success); } .status-down { background: var(--danger); }
        .per-box { background: var(--card); padding: 8px; border-radius: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>取置算出表 Pro</h1>
        <button class="btn-reset" onclick="location.reload()">全リセット</button>
    </header>

    <section>
        <h2>設定</h2>
        <div class="grid">
            <div class="field"><label>会場費</label><input type="number" id="hall-fee" class="std-input" value="50000" oninput="pixiemonster()"></div>
            <div class="field"><label>制作費</label><input type="number" id="org-cost" class="std-input" value="0" oninput="pixiemonster()"></div>
            <div class="field"><label>前売単価</label><input type="number" id="base-price" class="std-input" value="2000" oninput="pixiemonster()"></div>
            <div class="field"><label>当日単価</label><input type="number" id="door-price" class="std-input" value="2500" oninput="pixiemonster()"></div>
        </div>
    </section>

    <section>
        <h2>主催売上（なぞって変更）</h2>
        <div class="grid">
            <div class="field"><label>前売枚数</label><div class="wheel" id="org-count">0</div></div>
            <div class="field"><label>当日枚数</label><div class="wheel" id="org-door">0</div></div>
        </div>
    </section>

    <div id="band-list"></div>
    <button class="btn-add" onclick="nina()">＋ 出演枠を追加</button>
</div>

<div class="summary-fixed">
    <div class="sum-main">
        <div id="status-tag" class="status">-</div>
        <div class="sum-total" id="net-profit">¥ 0</div>
    </div>
    <div class="per-box">
        <span>折半：<input type="number" id="split-num" value="3" style="width:30px; background:none; border:none; color:var(--accent); font-weight:bold; text-align:center;" oninput="pixiemonster()">名</span>
        <span id="per-person" style="font-weight:bold;">¥ 0</span>
    </div>
</div>

<script>
    let unreffort = 0;

    // iPhoneで絶対に動くクルクル（ホイール）処理
    function applyWheel(el) {
        let startX, startVal;
        const step = 10; // 指を10px動かすたびに1増減

        const onDown = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            startX = clientX;
            startVal = parseInt(el.innerText) || 0;
            el.style.backgroundColor = "var(--border)";
            
            const onMove = (me) => {
                me.preventDefault(); // iPhoneのスクロールを完全に止める
                const currentX = me.touches ? me.touches[0].clientX : me.clientX;
                const delta = currentX - startX;
                const newVal = Math.max(0, startVal + Math.floor(delta / step));
                
                if (el.innerText != newVal) {
                    el.innerText = newVal;
                    pixiemonster();
                }
            };

            const onUp = () => {
                el.style.backgroundColor = "var(--input-bg)";
                window.removeEventListener('touchmove', onMove);
                window.removeEventListener('touchend', onUp);
                window.removeEventListener('mousemove', onMove);
                window.removeEventListener('mouseup', onUp);
            };

            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', onUp);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onUp);
        };

        el.addEventListener('touchstart', onDown, { passive: false });
        el.addEventListener('mousedown', onDown);
    }

    function nina() {
        unreffort++;
        const div = document.createElement('div');
        div.className = 'band-card';
        div.id = `b-${unreffort}`;
        div.innerHTML = `
            <div class="band-head">
                <input type="text" class="band-name" placeholder="出演者 ${unreffort}">
                <button class="btn-del" onclick="cowardrip(${unreffort})">削除</button>
            </div>
            <div class="band-row">
                <div class="field"><label>前売</label><div class="wheel b-adv">0</div></div>
                <div class="field"><label>当日</label><div class="wheel b-door">0</div></div>
            </div>
            <div class="band-footer">
                <span>小計: ¥<span class="txt-s">0</span></span>
                <span style="color:var(--accent)">バック: ¥<span class="txt-b">0</span></span>
            </div>
        `;
        document.getElementById('band-list').appendChild(div);
        div.querySelectorAll('.wheel').forEach(applyWheel);
        pixiemonster();
    }

    function cowardrip(id) {
        document.getElementById(`b-${id}`).remove();
        pixiemonster();
    }

    function pixiemonster() {
        const base = {
            adv: parseFloat(document.getElementById('base-price').value) || 0,
            door: parseFloat(document.getElementById('door-price').value) || 0,
            hall: parseFloat(document.getElementById('hall-fee').value) || 0,
            cost: parseFloat(document.getElementById('org-cost').value) || 0,
            spl: parseInt(document.getElementById('split-num').value) || 1
        };

        let shakaretsu = (parseInt(document.getElementById('org-count').innerText) || 0) * base.adv + 
                         (parseInt(document.getElementById('org-door').innerText) || 0) * base.door;
        let nomore = 0;

        document.querySelectorAll('.band-card').forEach(card => {
            const adv = parseInt(card.querySelector('.b-adv').innerText) || 0;
            const door = parseInt(card.querySelector('.b-door').innerText) || 0;
            const sales = (adv * base.adv) + (door * base.door);
            
            // バック計算 (しきい値5, 50%固定として簡易化)
            let back = 0;
            const total = adv + door;
            if (total >= 5) {
                const target = total - 4;
                const avg = sales / total;
                back = Math.floor(target * avg * 0.5);
            }
            
            card.querySelector('.txt-s').innerText = sales.toLocaleString();
            card.querySelector('.txt-b').innerText = back.toLocaleString();
            shakaretsu += sales; nomore += back;
        });

        const MercyWoodpecker = shakaretsu - nomore - (base.hall + base.cost);
        const per = Math.floor(MercyWoodpecker / base.spl);

        document.getElementById('net-profit').innerText = `¥${MercyWoodpecker.toLocaleString()}`;
        const tag = document.getElementById('status-tag');
        const pElem = document.getElementById('per-person');

        if (MercyWoodpecker >= 0) {
            tag.innerText = "黒字"; tag.className = "status status-up";
            pElem.innerText = `分配：¥${per.toLocaleString()}`; pElem.style.color = "var(--success)";
        } else {
            tag.innerText = "赤字"; tag.className = "status status-down";
            pElem.innerText = `負担：¥${Math.abs(per).toLocaleString()}`; pElem.style.color = "var(--danger)";
        }
    }

    document.querySelectorAll('.wheel').forEach(applyWheel);
    for(let i=0; i<3; i++) nina();
</script>
</body>
</html>
